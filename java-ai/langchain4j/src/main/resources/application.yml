server:
  port: 8080

spring:
  data:
    redis:
      host: 115.190.125.94
      port: 6379
      password: ${REDIS_PASSWORD:root}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Redisson 专属配置（优先级更高，更精细）
redisson:
  single-server-config:
    address: redis://115.190.125.94:6379
    password: ${REDIS_PASSWORD:root}
    database: 0
    # 连接池配置
    connection-pool-size: 16
    connection-minimum-idle-size: 8
    # 超时配置（毫秒）
    timeout: 3000
    connect-timeout: 3000
    retry-attempts: 3
    retry-interval: 1500

langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY:sk-51b422ad7151406b8c3ddb1ce0a424ba}
      model-name: qwen-turbo
      temperature: 0.7
      max-tokens: 2048
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY:sk-51b422ad7151406b8c3ddb1ce0a424ba}
      model-name: qwen-turbo

